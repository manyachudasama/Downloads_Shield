<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial;
      width: 250px;
      padding: 20px;
      background: #1e1e1e;
      color: white;
      text-align: center;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }

    .enabled {
      background: green;
    }

    .disabled {
      background: red;
    }
  </style>
</head>

<body>
  <h2>SafeShield</h2>

  <p id="statusText">Protection: ON</p>

  <button id="toggleBtn">Disable</button>

  <script src="popup.js"></script>
</body>
</html>
