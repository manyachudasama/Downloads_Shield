<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      width: 260px;
    }

    .container {
      padding: 20px;
      text-align: center;
    }

    .title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .status {
      font-size: 14px;
      margin-bottom: 20px;
      padding: 8px;
      border-radius: 6px;
    }

    .on {
      background: #064e3b;
      color: #34d399;
    }

    .off {
      background: #7f1d1d;
      color: #f87171;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }

    .enable {
      background: #22c55e;
      color: white;
    }

    .disable {
      background: #ef4444;
      color: white;
    }

    button:hover {
      opacity: 0.9;
    }

    .footer {
      margin-top: 15px;
      font-size: 11px;
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="title">Download Shield</div>

    <div id="statusBox" class="status">Protection: ON</div>

    <button id="toggleBtn">Disable Protection</button>

    <div class="footer">Smart Download Protection</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
