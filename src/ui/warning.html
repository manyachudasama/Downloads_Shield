<!DOCTYPE html>
<html>
<head>
  <title>SafeShield Warning</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      padding: 32px;
      border-radius: 10px;
      width: 420px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
      text-align: center;
    }

    .title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 20px;
    }

    .file {
      font-size: 13px;
      color: #cbd5f5;
      margin-bottom: 10px;
      word-break: break-all;
    }

    .reason {
      font-size: 14px;
      color: #f87171;
      margin-bottom: 25px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    button {
      padding: 10px 18px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
      cursor: pointer;
    }

    .proceed {
      background: #f59e0b;
      color: white;
    }

    .cancel {
      background: #334155;
      color: white;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="title">Download Blocked</div>
    <div class="subtitle">This file may pose a security risk</div>

    <div class="file" id="fileName"></div>
    <div class="reason" id="reason"></div>

    <div class="buttons">
      <button class="proceed" id="proceedBtn">Proceed Anyway</button>
      <button class="cancel" id="cancelBtn">Cancel</button>
    </div>
  </div>

  <script src="warning.js"></script>
</body>
</html>
