<!DOCTYPE html>
<html>
<head>
  <title>⚠️ Unsafe Download Blocked</title>
  <style>
    body {
      font-family: Arial;
      background: #121212;
      color: white;
      text-align: center;
      padding: 50px;
    }

    .box {
      background: #1e1e1e;
      padding: 30px;
      border-radius: 10px;
      display: inline-block;
      max-width: 500px;
    }

    .danger {
      color: #ff4d4d;
      font-size: 20px;
      margin-bottom: 20px;
    }

    button {
      margin: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .proceed {
      background: orange;
    }

    .cancel {
      background: gray;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>⚠️ Download Blocked</h1>

    <p id="fileName"></p>
    <p class="danger" id="reason"></p>

    <button class="proceed" id="proceedBtn">Proceed Anyway</button>
    <button class="cancel" id="cancelBtn">Cancel</button>
  </div>

  <script src="warning.js"></script>
</body>
</html>
