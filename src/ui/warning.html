<!DOCTYPE html>
<html>
<head>
  <title>Download Shield Warning</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 25px;
      border-radius: 10px;
      width: 420px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    h2 {
      margin-bottom: 10px;
    }

    .file {
      font-size: 12px;
      color: #cbd5f5;
      word-break: break-all;
    }

    .reason {
      color: #f87171;
      margin: 12px 0;
      font-weight: bold;
    }

    .buttons {
      margin-top: 15px;
    }

    button {
      margin: 8px;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .proceed {
      background: #f59e0b;
      color: white;
    }

    .cancel {
      background: #475569;
      color: white;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>Download Warning</h2>

    <div class="file" id="file"></div>
    <div class="reason" id="reason"></div>

    <div class="buttons">
      <button class="proceed" id="proceed">Proceed</button>
      <button class="cancel" id="cancel">Cancel</button>
    </div>
  </div>

  <script src="warning.js"></script>
</body>
</html>
