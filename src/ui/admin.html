<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .box {
      max-width: 500px;
      margin: auto;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 6px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    .log {
      background: #334155;
      margin-top: 10px;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
    }
  </style>
</head>

<body>

<div class="box" id="loginBox">
  <h2>Admin Login</h2>
  <input type="text" id="name" placeholder="Admin Name">
  <input type="password" id="password" placeholder="Password">
  <button id="loginBtn">Login</button>
</div>

<div class="box" id="dashboard" style="display:none;">
  <h2>Blocked Files</h2>
  <div id="logs"></div>
</div>

<script src="admin.js"></script>
</body>
</html>
